version: '3'

tasks:
  install:
    desc: Install client dependencies
    cmds:
      - npm install

  dev:
    desc: Run the client dev server
    deps: [install]
    cmds:
      - npm run dev -- --host

  lint:
    desc: Type-check client sources
    deps: [install]
    cmds:
      - npm run lint

  build:
    desc: Build the client
    deps: [install]
    cmds:
      - npm run build

  cap-sync:
    desc: Sync Capacitor native projects
    deps: [build]
    cmds:
      - npm run cap:sync

  cap-add-ios:
    desc: Add the iOS Capacitor project if missing
    deps: [install]
    status:
      - test -d ios/App
    cmds:
      - npx cap add ios

  cap-open-android:
    desc: Open the Android Capacitor project
    cmds:
      - npm run cap:open:android

  cap-open-ios:
    desc: Prepare and open the fixed iOS Capacitor shell
    cmds:
      - task: cap-add-ios
      - node ./scripts/configure-ios-dev-server.mjs
      - task: cap-sync
      - npm run cap:open:ios
