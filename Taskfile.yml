version: '3'

includes:
  server:
    taskfile: server/Taskfile.yml
    dir: server
  client:
    taskfile: client/Taskfile.yml
    dir: client

tasks:
  # ── Orchestration ──────────────────────────────────────────────────

  install:
    desc: Install project dependencies
    cmds:
      - task client:install

  dev:
    desc: Run the mobile web client
    cmds:
      - task client:dev

  sync:
    desc: Sync Capacitor native projects
    cmds:
      - task client:cap-sync

  android:
    desc: Prepare and open the Android shell
    cmds:
      - task client:cap-open-android

  ios:
    desc: Prepare and open the fixed iOS shell
    cmds:
      - task client:cap-open-ios

  check:
    desc: Check all projects
    cmds:
      - task server:check
      - task client:lint

  test:
    desc: Run all tests
    deps: [check]
    cmds:
      - task server:test

  build:
    desc: Build all projects
    cmds:
      - task server:build
      - task client:build

  # ── Deploy ─────────────────────────────────────────────────────────

  login:
    desc: Login to Spacetime using .env token
    cmds:
      - bash tools/spacetime_login.sh

  publish:
    desc: Publish webmobiledb to maincloud
    deps: [login, server:build]
    cmds:
      - spacetime publish -p server/bins/webmobiledb -s maincloud -y webmobiledb

  unsafe-overwrite:
    desc: Publish webmobiledb to maincloud and delete data
    deps: [login, server:build]
    cmds:
      - spacetime publish -p server/bins/webmobiledb -s maincloud -y webmobiledb --delete-data
